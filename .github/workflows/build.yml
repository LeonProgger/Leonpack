name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Force Build
        run: |
          wget https://gradle.org
          unzip gradle-8.7-bin.zip
          ./gradle-8.7/bin/gradle build --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: Leonpack-Mod
          path: build/libs/*.jar
