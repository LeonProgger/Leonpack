name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build Mod
        run: |
          if [ ! -f gradlew ]; then
            wget https://gradle.org
            unzip gradle-8.7-bin.zip
            ./gradle-8.7/bin/gradle build
          else
            chmod +x gradlew
            ./gradlew build
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: Leonpack-Mod
          path: build/libs/*.jar
